services:
  db:
    image: mysql:8.0
    container_name: marmitatech-db-v2
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: marmitadb
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3308:3306"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    image: marmitatech-app-v2
    build: .
    container_name: marmitatech-app-v2
    ports:
      - "4000:4000"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: user
      DB_PASS: password
      DB_NAME: marmitadb
    depends_on:
      db:
        condition: service_healthy
